name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    name: typecheck + numerical verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspaces
        run: npm ci || npm install

      - name: Typecheck (strict, all packages)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Dependency audit (critical = hard gate)
        run: npm audit --audit-level=critical

      - name: Dependency audit (high/moderate = advisory)
        run: npm audit --audit-level=moderate || true

      - name: Numerical + property verification (incl. solc compile)
        run: npm test

      - name: Build frontend terminal
        run: npm run build -w @amplifi/terminal

  contracts:
    name: foundry tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Vendor forge-std + OpenZeppelin (matches foundry.toml remappings)
        working-directory: contracts
        run: |
          mkdir -p lib
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          git clone --depth 1 --branch v5.1.0 \
            https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts

      - name: Forge build + test
        working-directory: contracts
        run: |
          forge build
          forge test -vvv
