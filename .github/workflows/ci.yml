name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    name: typecheck + numerical verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspaces
        run: npm ci || npm install

      - name: Typecheck (strict, all packages)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Numerical + property verification (incl. solc compile)
        run: npm test

      - name: Build frontend terminal
        run: npm run build -w @amplifi/terminal

  contracts:
    name: foundry tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (OpenZeppelin via npm)
        run: npm ci || npm install

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install forge-std
        working-directory: contracts
        run: forge install foundry-rs/forge-std --no-commit || true

      - name: Forge build + test
        working-directory: contracts
        run: |
          forge build
          forge test -vvv
