# AmpliFi reference services. Testnet/dev only — unaudited; see PRODUCTION_READINESS.md.
#   docker compose up --build
# Set AMPLIFI_API_KEYS to enable API-key auth (comma-separated); leave empty for open dev.
services:
  pricing-api:
    build:
      context: .
      dockerfile: services/pricing-api/Dockerfile
    environment:
      PORT: 8801
      ALLOW_ORIGIN: ${ALLOW_ORIGIN:-http://localhost:5173}
      AMPLIFI_API_KEYS: ${AMPLIFI_API_KEYS:-}
      AMPLIFI_RATE_MAX: ${AMPLIFI_RATE_MAX:-120}
      AMPLIFI_RATE_WINDOW_MS: ${AMPLIFI_RATE_WINDOW_MS:-60000}
    ports:
      - "8801:8801"
    restart: unless-stopped

  risk-engine:
    build:
      context: .
      dockerfile: services/risk-engine/Dockerfile
    environment:
      PORT: 8802
      AMPLIFI_API_KEYS: ${AMPLIFI_API_KEYS:-}
      AMPLIFI_RATE_MAX: ${AMPLIFI_RATE_MAX:-120}
      AMPLIFI_RATE_WINDOW_MS: ${AMPLIFI_RATE_WINDOW_MS:-60000}
    ports:
      - "8802:8802"
    restart: unless-stopped

  keeper:
    build:
      context: .
      dockerfile: services/keeper/Dockerfile
    environment:
      NODE_ENV: production
    restart: unless-stopped
